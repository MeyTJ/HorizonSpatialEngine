services:
  postgis:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: horizon
      POSTGRES_PASSWORD: horizon
      POSTGRES_DB: horizon_spatial
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U horizon -d horizon_spatial"]
      interval: 5s
      timeout: 5s
      retries: 10

  horizon-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "50051:50051"
    environment:
      HORIZON_LISTEN_ADDR: 0.0.0.0:50051
      DATABASE_URL: postgres://horizon:horizon@postgis:5432/horizon_spatial
      RUST_LOG: horizon=info
    volumes:
      - dataset_data:/data
    depends_on:
      postgis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgis_data:
  dataset_data:
